name: Litgrid Monitor

on:
  schedule:
    - cron: '0 6 * * *'   # Kasdien 08:00 Lietuvos laiku (06:00 UTC)
  workflow_dispatch:       # Galima paleisti rankiniu būdu

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Paleisti monitoringą
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAIL:     ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: Išsaugoti duomenis
        run: |
          git config user.name  "Litgrid Bot"
          git config user.email "bot@noreply.github.com"
          git add data/previous.json
          git diff --staged --quiet || git commit -m "snapshot: $(date -u +%Y-%m-%d)"
          git push
